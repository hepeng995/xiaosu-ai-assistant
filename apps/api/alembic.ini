# Alembic 配置；实际数据库连接由 migrations/env.py 用 settings.DATABASE_URL 注入。
[alembic]
script_location = migrations
prepend_sys_path = .
# 占位 url，env.py 会用应用配置（settings.DATABASE_URL）覆盖
sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5433/xiaosu

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
